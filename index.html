<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sahara Live - Real Time Desert Cam</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <h1>🌵 Sahara Live</h1>
    <p>Real-Time Desert Camera • North Africa</p>
  </div>

  <div class="live-box">
    <div class="live-badge">
      <div class="live-dot"></div>
      LIVE
    </div>
    <video id="desertVideo" controls autoplay loop muted playsinline>
      <source src="sahara-desert.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>

  <div class="info">
    <p>Live view from the Sahara Desert. The video will autoplay when the page loads.</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
